version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: product_db
    ports:
      - "3306:3306"
    networks:
      - microservices-net
    volumes:
      - mysql_data:/var/lib/mysql

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SERVER_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - microservices-net
    volumes:
      - sqlserver_data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - microservices-net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - microservices-net
    volumes:
      - redis_data:/data

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - microservices-net

  eureka-server:
    build: ./eureka
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - microservices-net

  api-gateway:
    build: ./gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
      - zipkin
    networks:
      - microservices-net
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URL: ${EUREKA_URL}
      TEL_EXPORTER_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      OTEL_TRACES_EXPORTER: zipkin
      OTEL_SERVICE_NAME: api-gateway

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      - mysql
      - eureka-server
      - zipkin
    networks:
      - microservices-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      EUREKA_URL: ${EUREKA_URL}
      TEL_EXPORTER_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      OTEL_TRACES_EXPORTER: zipkin
      OTEL_SERVICE_NAME: auth-service

  product-service:
    build: ./product-service
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - redis
      - zipkin
    networks:
      - microservices-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_URL: ${EUREKA_URL}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      TEL_EXPORTER_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      OTEL_TRACES_EXPORTER: zipkin
      OTEL_SERVICE_NAME: product-service

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      - sqlserver
      - eureka-server
      - rabbitmq
      - zipkin
    networks:
      - microservices-net
    environment:
      SQL_SERVER_PASSWORD: ${SQL_SERVER_PASSWORD}
      EUREKA_URL: ${EUREKA_URL}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      TEL_EXPORTER_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      OTEL_TRACES_EXPORTER: zipkin
      OTEL_SERVICE_NAME: order-service

networks:
  microservices-net:
    driver: bridge

volumes:
  mysql_data:
  sqlserver_data:
  redis_data:
  rabbitmq_data: